# Intégration continue AGRIVO (étape 6 du pipeline « Du besoin à la Release »).
# À chaque push et pull request : lint, vérification des types, tests, build de production.
# Une CI verte est la preuve que le projet est livrable ; la branche main ne fusionne pas sans elle.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Types (TypeScript strict)
        run: npm run typecheck

      - name: Tests (Vitest)
        run: npm test

      - name: Build de production (Next.js)
        run: npm run build
